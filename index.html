tx.stroke();if(m.life<=0||m.x<-200||m.y>h+200)meteors.splice(i,1)}}function drawE(){ectx.clearRect(0,0,w,h);const cx=w*.64+(mx-w/2)*.035,cy=h*.235+(my-h/2)*.02,r=Math.min(w,h)*(.21+charge*.03);ectx.save();ectx.translate(cx,cy);ectx.rotate(tick*.00007);ectx.strokeStyle=`rgba(255,210,110,${.10+charge*.18})`;ectx.lineWidth=1.2;ectx.beginPath();ectx.arc(0,0,r,0,Math.PI*2);ectx.stroke();ectx.strokeStyle=`rgba(80,190,255,${.10+charge*.18})`;ectx.beginPath();ectx.arc(0,0,r*.82,0,Math.PI*1.65);ectx.stroke();ectx.restore();if(trails.length>1){ectx.beginPath();for(let i=0;i<trails.length;i++){const t=trails[i];i?ectx.lineTo(t.x,t.y):ectx.moveTo(t.x,t.y)}ectx.strokeStyle='rgba(95,190,255,.28)';ectx.lineWidth=4;ectx.stroke()}for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.life--;r.r+=(r.maxR-r.r)*.16;const a=Math.max(0,r.life/r.max);ectx.strokeStyle=r.h==='gold'?`rgba(255,214,120,${a*.65})`:r.h==='blue'?`rgba(98,195,255,${a*.65})`:`rgba(255,255,255,${a*.55})`;ectx.lineWidth=r.line;ectx.beginPath();ectx.arc(r.x,r.y,r.r,0,Math.PI*2);ectx.stroke();if(r.life<=0)rings.splice(i,1)}for(let i=bolts.length-1;i>=0;i--){const b=bolts[i];b.life--;const a=Math.max(0,b.life/b.max);ectx.strokeStyle=b.h==='gold'?`rgba(255,223,150,${a*.75})`:`rgba(115,198,255,${a*.75})`;ectx.lineWidth=1.2+a*2.8;ectx.beginPath();b.pts.forEach((pt,j)=>j?ectx.lineTo(pt.x,pt.y):ectx.moveTo(pt.x,pt.y));ectx.stroke();if(b.life<=0)bolts.splice(i,1)}}function drawG(){gctx.clearRect(0,0,w,h);const cx=w*.64+(mx-w/2)*.035,cy=h*.235+(my-h/2)*.02,r=Math.min(w,h)*(.21+charge*.03);gctx.save();gctx.translate(cx,cy);gctx.rotate(tick*.00010);gctx.font=`${12+charge*8}px Georgia`;gctx.textAlign='center';gctx.textBaseline='middle';for(let i=0;i<34;i++){const a=Math.PI*2/34*i+tick*.00008;gctx.fillStyle=i%2?`rgba(80,190,255,${.08+charge*.22})`:`rgba(255,218,122,${.09+charge*.22})`;gctx.fillText(runes[i%runes.length],Math.cos(a)*r,Math.sin(a)*r)}gctx.restore();for(let i=glyphs.length-1;i>=0;i--){const g=glyphs[i];g.x+=g.vx;g.y+=g.vy;g.vx*=.985;g.vy*=.985;g.life--;const a=Math.max(0,g.life/g.max);gctx.font=`${g.size*(.65+a*.6)}px Georgia`;gctx.textAlign='center';gctx.textBaseline='middle';gctx.fillStyle=`rgba(${g.c[0]},${g.c[1]},${g.c[2]},${a*.9})`;gctx.fillText(g.ch,g.x,g.y);if(g.life<=0)glyphs.splice(i,1)}}function drawH(){hctx.clearRect(0,0,w,h);const age=performance.now()-lastInputAt,a=age<2200?1-age/2200:0;if(a>0){hctx.strokeStyle=`rgba(255,255,255,${a*.2})`;hctx.lineWidth=1;hctx.beginPath();hctx.moveTo(mx-8,my);hctx.lineTo(mx+8,my);hctx.moveTo(mx,my-8);hctx.lineTo(mx,my+8);hctx.stroke()}}function frame(){tick=performance.now();mx+=(tx-mx)*.08;my+=(ty-my)*.08;charge+=((down?1:0)-charge)*.06;shakeX+=(0-shakeX)*.18;shakeY+=(0-shakeY)*.18;for(let i=trails.length-1;i>=0;i--){trails[i].life--;if(trails[i].life<=0)trails.splice(i,1)}vars();drawP();drawE();drawG();drawH();requestAnimationFrame(frame)}resize();frame();for(let i=0;i<3;i++)setTimeout(()=>meteor(Math.random()*w,Math.random()*h*.24,i%2?'gold':'blue'),700+i*650)})();
