function meteor(x=Math.random()*w,y=Math.random()*h*.35,hueName='blue'){meteors.push({x,y,vx:-5-Math.random()*8,vy:2+Math.random()*4,life:48+Math.random()*40,max:88,len:60+Math.random()*90,h:hueName});SOUND.meteor()}function bolt(x1,y1,x2,y2,hueName='blue'){const pts=[{x:x1,y:y1}];for(let i=1;i<14;i++){const t=i/14;pts.push({x:x1+(x2-x1)*t+(Math.random()-.5)*26,y:y1+(y2-y1)*t+(Math.random()-.5)*18})}pts.push({x:x2,y:y2});bolts.push({pts,life:16,max:16,h:hueName});SOUND.bolt()}function glitch(){klass(glitchEl,'on');shakeX+=(Math.random()-.5)*22;shakeY+=(Math.random()-.5)*16;SOUND.glitch()}function pointer(e){const p=e.touches?e.touches[0]:e;tx=p.clientX;ty=p.clientY;stamp()}
obelisk.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();tx=w*.604;ty=h*.25;mx=tx;my=ty;burst(tx,ty,1.6,'blue');activateMidi()},{passive:false});
addEventListener('pointerdown',e=>{pointer(e);down=true;unlock();if(!midiTried)navigator.requestMIDIAccess&&setTimeout(()=>activateMidi(),0);burst(tx,ty,1.05,'random');SOUND.click(tx);trails.push({x:tx,y:ty,life:16,max:16})},{passive:false});addEventListener('pointermove',e=>{pointer(e);if(down){trails.push({x:tx,y:ty,life:16,max:16});if(trails.length>80)trails.shift();SOUND.drag(tx);if(Math.random()<.28)sparks.push({x:tx+(Math.random()-.5)*20,y:ty+(Math.random()-.5)*20,vx:(Math.random()-.5)*2.5,vy:(Math.random()-.5)*2.5,life:18+Math.random()*16,max:34,r:.8+Math.random()*2,h:Math.random()>.5?'gold':'blue'});if(Math.random()<.065)bolt(tx,ty,w*.64+(Math.random()-.5)*60,h*.23+(Math.random()-.5)*50,Math.random()>.5?'blue':'gold')}},{passive:false});addEventListener('pointerup',()=>{down=false;SOUND.release()});addEventListener('wheel',e=>{e.preventDefault();unlock();stamp();const d=Math.sign(e.deltaY);zoom+=d>0?-.03:.03;zoom=Math.max(1.02,Math.min(1.18,zoom));hue+=d>0?-8:8;burst(mx,my,.55,d>0?'blue':'gold');SOUND.wheel(d);show(d>0?'DOWN':'UP',d>0?'rgba(66,173,255,.9)':'rgba(255,203,97,.95)')},{passive:false});
addEventListener('keydown',e=>{unlock();stamp();const k=e.key,code=e.code||'',low=k.toLowerCase(),cc=k&&k.length===1?k.charCodeAt(0):0,c=colors[(cc||code.length||1)%colors.length],rgba=`rgba(${c[0]},${c[1]},${c[2]},.92)`;show(k===' '?'SPACE':k,rgba);if(k===' '){e.preventDefault();burst(w*.5,h*.52,1.8,'gold');glyphBurst(w*.5,h*.52,28,'✦◌△');hue+=18;SOUND.space();return}if(k==='Enter'){burst(w*.64,h*.23,2.2,'blue');bolt(mx,my,w*.64,h*.23,'blue');glyphBurst(w*.64,h*.23,24,'⟡✧');SOUND.enter();return}if(k==='Backspace'||k==='Delete'){glitch();glyphBurst(mx,my,18,'////');SOUND.delete();return}if(k==='Escape'){particles.splice(0,particles.length/3);trails.length=sparks.length=rings.length=0;burst(w*.5,h*.5,.8,'blue');SOUND.escape();return}if(k==='Tab'){e.preventDefault();glitch();meteor();meteor(w*.85,h*.18,'gold');SOUND.tab();return}if(code.startsWith('Arrow')){const step=55;if(code==='ArrowLeft')tx-=step;if(code==='ArrowRight')tx+=step;if(code==='ArrowUp')ty-=step;if(code==='ArrowDown')ty+=step;tx=Math.max(0,Math.min(w,tx));ty=Math.max(0,Math.min(h,ty));burst(tx,ty,.55,'random');SOUND.arrow(code);return}if(/^[0-9]$/.test(k)){const n=Number(k);for(let i=0;i<=n;i++)meteor(Math.random()*w,Math.random()*h*.35,i%2?'gold':'blue');burst(mx,my,.35+n*.07,n%2?'gold':'blue');SOUND.number(k);return}if(/^[a-z]$/i.test(k)){if('aeiou'.includes(low)){burst(mx,my,.75,'gold');glyphBurst(mx,my,20,k+runes);SOUND.vowel(low)}else{bolt(mx,my,w*.64+(Math.random()-.5)*120,h*.23+(Math.random()-.5)*80,'blue');glyphBurst(mx,my,12,k);SOUND.consonant(low)}if('mqxz'.includes(low))glitch();if('sdfjkl'.includes(low))hue+=11;if('bpr'.includes(low))meteor(Math.random()*w,Math.random()*h*.22,'gold');return}glitch();glyphBurst(mx,my,16,k||'∎');meteor(Math.random()*w,Math.random()*h*.30,Math.random()>.5?'gold':'blue')},{passive:false});
addEventListener('paste',e=>{unlock();const t=e.clipboardData?.getData('text')||'PASTE';show('PASTE','rgba(120,255,190,.95)');burst(mx,my,1.4,'gold');glyphBurst(mx,my,Math.min(60,Math.max(16,t.length*2)),t.slice(0,30));SOUND.paste(t)});addEventListener('drop',e=>{e.preventDefault();unlock();const n=e.dataTransfer?.files?.length||1;show(n>1?`${n} FILES`:'DROP','rgba(143,98,255,.96)');burst(mx,my,1.7,'blue');for(let i=0;i<n*3;i++)meteor(Math.random()*w,Math.random()*h*.25,i%2?'blue':'gold');glitch();SOUND.drop(n)});addEventListener('dragover',e=>{e.preventDefault();hue+=.5});addEventListener('contextmenu',e=>{e.preventDefault();unlock();burst(tx,ty,1.2,'blue');bolt(tx,ty,w*.18+Math.random()*w*.64,h*.15+Math.random()*h*.35,'gold');show('ALT','rgba(255,110,170,.95)');SOUND.right()});addEventListener('blur',()=>{if(ac)SOUND.blur();glitch()});addEventListener('focus',()=>{if(ac)SOUND.focus();burst(w*.5,h*.5,.5,'gold')});addEventListener('resize',resize);
function drawP(){pctx.clearRect(0,0,w,h);for(const s of stars){s.tw+=.02+s.r*.002;pctx.beginPath();pctx.fillStyle=`rgba(255,255,255,${Math.max(.02,s.a+Math.sin(s.tw)*.12)})`;pctx.arc(s.x,s.y,s.r,0,Math.PI*2);pctx.fill()}for(const p of particles){p.x+=p.vx*p.z+(mx-w/2)*.00012*p.z;p.y+=p.vy*p.z+(my-h/2)*.00008*p.z;if(p.x<-30)p.x=w+30;if(p.x>w+30)p.x=-30;if(p.y<-30)p.y=h+30;if(p.y>h+30)p.y=-30;pctx.beginPath();pctx.fillStyle=`rgba(120,185,255,${p.a})`;pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill()}for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vx*=.97;s.vy*=.97;s.vy+=.012;s.life--;const a=Math.max(0,s.life/s.max);pctx.beginPath();pctx.fillStyle=s.h==='gold'?`rgba(255,205,92,${a})`:`rgba(67,184,255,${a})`;pctx.arc(s.x,s.y,Math.max(.1,s.r*a),0,Math.PI*2);pctx.fill();if(s.life<=0)sparks.splice(i,1)}for(let i=meteors.length-1;i>=0;i--){const m=meteors[i];m.x+=m.vx;m.y+=m.vy;m.life--;const a=Math.max(0,m.life/m.max);pctx.strokeStyle=m.h==='gold'?`rgba(255,214,120,${a*.8})`:`rgba(98,195,255,${a*.8})`;pctx.lineWidth=2;pctx.beginPath();pctx.moveTo(m.x,m.y);pctx.lineTo(m.x-m.vx*6,m.y-m.vy*6);pctx.stroke();if(m.life<=0||m.x<-200||m.y>h+200)meteors.splice(i,1)}}
function drawE(){ectx.clearRect(0,0,w,h);const cx=w*.64+(mx-w/2)*.035,cy=h*.235+(my-h/2)*.02,r=Math.min(w,h)*(.21+charge*.03);ectx.save();ectx.translate(cx,cy);ectx.rotate(tick*.00007);ectx.strokeStyle=`rgba(255,210,110,${.10+charge*.18})`;ectx.lineWidth=1.2;ectx.beginPath();ectx.arc(0,0,r,0,Math.PI*2);ectx.stroke();ectx.strokeStyle=`rgba(80,190,255,${.10+charge*.18})`;ectx.beginPath();ectx.arc(0,0,r*.82,0,Math.PI*1.65);ectx.stroke();ectx.restore();if(trails.length>1){ectx.beginPath();for(let i=0;i<trails.length;i++){const t=trails[i];i?ectx.lineTo(t.x,t.y):ectx.moveTo(t.x,t.y)}ectx.strokeStyle='rgba(95,190,255,.28)';ectx.lineWidth=4;ectx.stroke()}for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.life--;r.r+=(r.maxR-r.r)*.16;const a=Math.max(0,r.life/r.max);ectx.strokeStyle=r.h==='gold'?`rgba(255,214,120,${a*.65})`:r.h==='blue'?`rgba(98,195,255,${a*.65})`:`rgba(255,255,255,${a*.55})`;ectx.lineWidth=r.line;ectx.beginPath();ectx.arc(r.x,r.y,r.r,0,Math.PI*2);ectx.stroke();if(r.life<=0)rings.splice(i,1)}for(let i=bolts.length-1;i>=0;i--){const b=bolts[i];b.life--;const a=Math.max(0,b.life/b.max);ectx.strokeStyle=b.h==='gold'?`rgba(255,223,150,${a*.75})`:`rgba(115,198,255,${a*.75})`;ectx.lineWidth=1.2+a*2.8;ectx.beginPath();b.pts.forEach((pt,j)=>j?ectx.lineTo(pt.x,pt.y):ectx.moveTo(pt.x,pt.y));ectx.stroke();if(b.life<=0)bolts.splice(i,1)}}
function drawG(){gctx.clearRect(0,0,w,h);const cx=w*.64+(mx-w/2)*.035,cy=h*.235+(my-h/2)*.02,r=Math.min(w,h)*(.21+charge*.03);gctx.save();gctx.translate(cx,cy);gctx.rotate(tick*.00010);gctx.font=`${12+charge*8}px Georgia`;gctx.textAlign='center';gctx.textBaseline='middle';for(let i=0;i<34;i++){const a=Math.PI*2/34*i+tick*.00008;gctx.fillStyle=i%2?`rgba(80,190,255,${.08+charge*.22})`:`rgba(255,218,122,${.09+charge*.22})`;gctx.fillText(runes[i%runes.length],Math.cos(a)*r,Math.sin(a)*r)}gctx.restore();for(let i=glyphs.length-1;i>=0;i--){const g=glyphs[i];g.x+=g.vx;g.y+=g.vy;g.vx*=.985;g.vy*=.985;g.life--;const a=Math.max(0,g.life/g.max);gctx.font=`${g.size*(.65+a*.6)}px Georgia`;gctx.textAlign='center';gctx.textBaseline='middle';gctx.fillStyle=`rgba(${g.c[0]},${g.c[1]},${g.c[2]},${a*.9})`;gctx.fillText(g.ch,g.x,g.y);if(g.life<=0)glyphs.splice(i,1)}}
function drawH(){hctx.clearRect(0,0,w,h);const age=performance.now()-lastInputAt,a=age<2200?1-age/2200:0;if(a>0){hctx.strokeStyle=`rgba(255,255,255,${a*.2})`;hctx.lineWidth=1;hctx.beginPath();hctx.moveTo(mx-8,my);hctx.lineTo(mx+8,my);hctx.moveTo(mx,my-8);hctx.lineTo(mx,my+8);hctx.stroke()}if(midiOn){hctx.font='700 10px system-ui';hctx.fillStyle='rgba(120,255,190,.72)';hctx.fillText('MIDI: '+midiName,14,22)}}
function frame(){tick=performance.now();mx+=(tx-mx)*.08;my+=(ty-my)*.08;charge+=((down?1:0)-charge)*.06;shakeX+=(0-shakeX)*.18;shakeY+=(0-shakeY)*.18;for(let i=trails.length-1;i>=0;i--){trails[i].life--;if(trails[i].life<=0)trails.splice(i,1)}vars();drawP();drawE();drawG();drawH();requestAnimationFrame(frame)}
resize();frame();for(let i=0;i<3;i++)setTimeout(()=>meteor(Math.random()*w,Math.random()*h*.24,i%2?'gold':'blue'),700+i*650)
})();
